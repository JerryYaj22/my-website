<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="ampsiteslogo.png">
    <link rel="stylesheet" href="admin-login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-admin.js" defer></script>
    <script src="admin-login.js" defer></script>
    <title>Amplified Sites</title>
</head>
<body>
    <section class="amp-login">
        <div class="amp-image">
            <img src="ampsites2.png" alt="amplogo">
        </div>
        <form id="loginForm">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button type="submit" id="loginBtn">Login</button>
            <div class="error" id="error">Invalid login</div>
            <div class="note">Only authorized users can access this dashboard</div>
        </form>
    </section>
</body>
</html>
